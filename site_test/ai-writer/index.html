<!doctype html><html lang='zh-CN'><head><meta charset='utf-8' /><meta name='viewport' content='width=device-width, initial-scale=1' /><title>AI 写作助手</title><style>body{font-family:Segoe UI,Arial,sans-serif;max-width:1240px;margin:0 auto;padding:24px;line-height:1.6;background:#f8fafc;color:#0f172a;position:relative;}h1{margin:0 0 8px;}section{background:#fff;border:1px solid #cbd5e1;border-radius:10px;padding:14px 16px;margin:14px 0;}label{display:block;font-weight:600;margin-top:8px;}input,select,textarea{width:100%;padding:8px;margin-top:6px;border:1px solid #94a3b8;border-radius:8px;box-sizing:border-box;}textarea{min-height:110px;}button{margin-top:10px;margin-right:8px;padding:8px 14px;border-radius:8px;border:1px solid #2563eb;background:#2563eb;color:#fff;cursor:pointer;}button:hover{opacity:0.92;}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.result{white-space:pre-wrap;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:8px;padding:10px;margin-top:10px;}.hint{color:#475569;font-size:14px;}.topbar{position:relative;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin:14px 0 10px;}.intro{flex:1 1 auto;min-width:0;max-width:none;padding-right:72px;}.main-shell{max-width:none;}.runtime-wrap{position:absolute;top:0;right:0;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}.runtime-toggle{margin-top:0;margin-right:0;padding:6px 10px;font-size:12px;line-height:1;min-width:44px;}.runtime-panel{position:absolute;top:38px;right:0;width:280px;background:#fff;border:1px solid #cbd5e1;border-radius:12px;padding:12px 14px;box-sizing:border-box;box-shadow:0 12px 28px rgba(15,23,42,0.18);z-index:20;}.runtime-panel.hidden{display:none;}.runtime-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;}.runtime-panel h2{margin:0;font-size:17px;}.runtime-close{margin:0;padding:2px 8px;font-size:16px;line-height:1;border-color:#cbd5e1;background:#fff;color:#334155;}.runtime-panel .hint{margin:0 0 8px;line-height:1.4;font-size:13px;}.runtime-panel label{font-size:13px;margin-top:6px;}.runtime-panel input,.runtime-panel select{padding:6px;font-size:14px;}.runtime-panel button{padding:6px 10px;font-size:13px;}.runtime-panel .result{font-size:13px;padding:8px;margin-top:8px;}@media (max-width: 900px){.grid{grid-template-columns:1fr;}.intro{padding-right:0;}.runtime-wrap{position:static;}.runtime-panel{position:fixed;top:56px;right:12px;left:12px;width:auto;}}</style></head><body><p><a href='/first-depot/blog'>返回博客</a></p><div class='topbar'><div class='intro'><h1>AI 写作助手</h1><p>输入主题后直接生成结果，再按需改写、润色或翻译。支持 mock / Ollama / OpenAI 兼容接口。</p></div><div class='runtime-wrap'><button class='runtime-toggle' onclick='toggleRuntimePanel()'>设置</button><aside id='runtime_panel' class='runtime-panel hidden'><div class='runtime-head'><h2>运行挡位</h2><button class='runtime-close' onclick='closeRuntimePanel()'>×</button></div><p class='hint'>只影响当前服务，重启后恢复默认配置。</p><div><label>模式</label><select id='provider' onchange='onProviderChange()'><option value='mock'>mock（演示）</option><option value='ollama'>ollama（本地）</option><option value='openai'>openai（远程/兼容）</option></select></div><div><label>服务地址</label><input id='base_url' placeholder='例如：http://127.0.0.1:11434' /></div><div><label>模型</label><input id='model_name' placeholder='例如：qwen2.5:3b-instruct' /></div><div><label>API Key</label><input id='api_key' type='password' placeholder='mock 可留空，ollama 可填 local' /></div><button onclick='fillRecommended()'>推荐值</button><button onclick='applyRuntime()'>应用</button><div id='runtime' class='result'>运行模式检测中...</div><div id='runtime_apply' class='hint'></div></aside></div></div><div class='main-shell'><section><div class='grid'><div><label>主题</label><input id='topic' placeholder='例如：AI 如何帮助学生写课程报告' /></div><div><label>场景</label><select id='scene'><option value='copy'>文案</option><option value='report'>报告</option><option value='email'>邮件</option><option value='translate'>翻译稿</option></select></div><div><label>语气</label><select id='tone'><option value='natural'>自然</option><option value='formal'>正式</option><option value='professional'>专业</option></select></div><div><label>字数</label><input id='word_count' type='number' min='50' max='1200' step='10' value='150' placeholder='例如：80 / 150 / 300' /></div><div><label>写作语言</label><select id='language'><option value='zh' selected>中文</option><option value='en'>English</option></select></div></div><button onclick='genDraft()'>生成结果</button><div id='draft' class='result'></div></section><section><label>待改写段落</label><textarea id='paragraph'></textarea><label>改写要求</label><input id='instruction' value='请改得更简洁清晰。' /><button onclick='rewritePara()'>段落改写</button><div id='rewrite' class='result'></div></section><section><label>待润色全文</label><textarea id='fulltext'></textarea><button onclick='polishText()'>全文润色</button><div id='polish' class='result'></div></section><section><label>翻译文本</label><textarea id='translate_input'></textarea><div class='grid'><div><label>源语言</label><select id='source_language'><option value='auto' selected>自动识别</option><option value='zh'>中文</option><option value='en'>English</option></select></div><div><label>目标语言</label><select id='target_language'><option value='en' selected>English</option><option value='zh'>中文</option></select></div></div><button onclick='translateText()'>开始翻译</button><div id='translate' class='result'></div></section></div><script>const REQUEST_TIMEOUT_MS = 180000;function val(id){return document.getElementById(id).value.trim()}function setValue(id, value){document.getElementById(id).value = value || '';}function show(id, obj){document.getElementById(id).textContent = typeof obj==='string' ? obj : JSON.stringify(obj,null,2)}function renderOutline(data){ if(!data || typeof data!=='object'){ return '暂无结果'; } const lines=[]; if(data.title){ lines.push(data.title); lines.push(''); } const sections=Array.isArray(data.sections)?data.sections:[]; for(const sec of sections){ if(sec && sec.heading){ lines.push(sec.heading); } const bullets=Array.isArray(sec && sec.bullets)?sec.bullets:[]; for(const item of bullets){ lines.push(`- ${item}`); } lines.push(''); } return lines.join('\n').trim(); }function errMsg(e){return e && e.name==='AbortError' ? '请求超时，请重试。' : (e && e.message ? e.message : '请求失败');}function recommendedRuntime(provider){ if(provider==='ollama'){ return {provider:'ollama', base_url:'http://127.0.0.1:11434', model:'qwen2.5:3b-instruct', api_key:'local'}; } if(provider==='openai'){ return {provider:'openai', base_url:'https://api.openai.com/v1', model:'gpt-4o-mini', api_key:''}; } return {provider:'mock', base_url:'', model:'mock', api_key:''}; }function renderRuntimeStatus(data){ const parts=[`当前模式：${data.provider||'unknown'}`,`模型：${data.model||'-'}`]; if(data.base_url){ parts.push(`地址：${data.base_url}`); } if(data.api_key_present){ parts.push('API Key：已设置'); } document.getElementById('runtime').textContent=parts.join(' | '); }function onProviderChange(){ const provider = val('provider') || 'mock'; const disabled = provider === 'mock'; document.getElementById('base_url').disabled = disabled; document.getElementById('model_name').disabled = disabled; document.getElementById('api_key').disabled = disabled; }function toggleRuntimePanel(){ document.getElementById('runtime_panel').classList.toggle('hidden'); }function closeRuntimePanel(){ document.getElementById('runtime_panel').classList.add('hidden'); }function fillRuntimeForm(data){ setValue('provider', data.provider); setValue('base_url', data.base_url); setValue('model_name', data.model); setValue('api_key', ''); onProviderChange(); }function fillRecommended(){ const runtime = recommendedRuntime(val('provider') || 'mock'); fillRuntimeForm(runtime); show('runtime_apply', '已填入推荐值，点击“应用挡位”后生效。'); }async function loadRuntime(){ try{ const r = await fetch('/api/ai-writer/runtime'); const payload = await r.json(); if(!payload.ok){ throw new Error(payload.error || '加载失败'); } fillRuntimeForm(payload.data); renderRuntimeStatus(payload.data); show('runtime_apply', '当前挡位已加载。'); } catch(e){ show('runtime_apply', errMsg(e)); document.getElementById('runtime').textContent='运行模式检测失败'; } }async function applyRuntime(){ show('runtime_apply', '应用中...'); try{ const payload = { provider: val('provider'), base_url: val('base_url'), model: val('model_name'), api_key: val('api_key') }; const res = await req('/api/ai-writer/runtime', payload); if(!res.ok){ show('runtime_apply', res.error || '应用失败'); return; } renderRuntimeStatus(res.data); setValue('api_key', ''); show('runtime_apply', '挡位已应用，后续生成将使用新配置。'); closeRuntimePanel(); } catch(e){ show('runtime_apply', errMsg(e)); } }async function req(path, payload){ const controller = new AbortController(); const timer = setTimeout(()=>controller.abort(), REQUEST_TIMEOUT_MS); try {  const r = await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:controller.signal});  return await r.json(); } finally { clearTimeout(timer); }}function basePayload(){return {topic:val('topic'),scene:val('scene'),tone:val('tone'),word_count:val('word_count'),language:val('language')}}async function genDraft(){show('draft','生成中...'); try{const payload=basePayload(); const res=await req('/api/ai-writer/draft',payload); if(!res.ok){show('draft',res.error||'请求失败');return;} show('draft',res.data.markdown); document.getElementById('fulltext').value=res.data.markdown;}catch(e){show('draft',errMsg(e));}}async function rewritePara(){show('rewrite','改写中...'); try{const payload={paragraph:val('paragraph'),instruction:val('instruction'),tone:val('tone'),language:val('language')}; const res=await req('/api/ai-writer/rewrite',payload); if(!res.ok){show('rewrite',res.error||'请求失败');return;} show('rewrite',res.data.text);}catch(e){show('rewrite',errMsg(e));}}async function polishText(){show('polish','润色中...'); try{const payload={text:val('fulltext'),tone:val('tone'),language:val('language')}; const res=await req('/api/ai-writer/polish',payload); if(!res.ok){show('polish',res.error||'请求失败');return;} show('polish',res.data.text);}catch(e){show('polish',errMsg(e));}}async function translateText(){show('translate','翻译中...'); try{const payload={text:val('translate_input'),source_language:val('source_language'),target_language:val('target_language')}; const res=await req('/api/ai-writer/translate',payload); if(!res.ok){show('translate',res.error||'请求失败');return;} show('translate',res.data.text);}catch(e){show('translate',errMsg(e));}}loadRuntime();</script></body></html>
