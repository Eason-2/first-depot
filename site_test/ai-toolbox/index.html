<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 工具箱</title>
  <link rel="stylesheet" href="/first-depot/ai-toolbox/app.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-topbar">
        <div>
          <p class="eyebrow">AI 工具箱</p>
          <h1>博客内置 AI 工具箱</h1>
          <p>按“写作助手”的接入方式，直接集成到博客服务里，支持三挡位：mock / ollama / openai。</p>
          <p><a href="/first-depot/blog">返回知行简报</a></p>
        </div>
        <div class="hero-actions">
          <button id="runtime-button" type="button" class="secondary">设置挡位</button>
          <div id="runtime-summary" class="runtime-summary">当前模式：加载中</div>
        </div>
      </div>
    </section>
    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>开始使用</h2>
          <p>选择一个工具，填写内容后直接提交即可。</p>
        </div>
        <label class="field compact"><span>工具</span><select id="tool-select"></select></label>
      </div>
      <div class="tool-intro"><h3 id="tool-title"></h3><p id="tool-description"></p><div id="tool-tip"></div></div>
      <form id="tool-form" class="tool-form">
        <div id="fields-container" class="fields-grid"></div>
        <div class="actions"><button id="submit-button" type="submit">开始生成</button><button id="reset-button" type="button" class="secondary">恢复示例</button></div>
      </form>
    </section>
    <section class="panel">
      <div class="status-row"><span id="status-badge" class="status idle">准备就绪</span><span id="http-status" class="http-status">未提交</span></div>
      <p id="status-message" class="status-message">填写信息后点击“开始生成”。</p>
      <p id="error-message" class="error-message hidden"></p>
      <div id="rendered-result" class="rendered-result empty">生成完成后，这里会显示整理好的结果。</div>
    </section>
  </main>
  <div id="runtime-overlay" class="runtime-overlay hidden">
    <div class="runtime-modal">
      <div class="runtime-modal-header">
        <div>
          <h3>运行挡位</h3>
          <p>这里直接切换 mock / ollama / openai，不影响博客原有文章页。</p>
        </div>
        <button id="runtime-close" type="button" class="secondary">关闭</button>
      </div>
      <form id="runtime-form" class="runtime-form">
        <div class="fields-grid runtime-grid">
          <label class="field"><span>模式</span><select id="runtime-provider"><option value="mock">mock（演示）</option><option value="ollama">ollama（本地）</option><option value="openai">openai（远程/兼容）</option></select></label>
          <label class="field"><span>服务地址</span><input id="runtime-base-url" type="text" /></label>
          <label class="field"><span>模型名</span><input id="runtime-model" type="text" /></label>
          <label class="field"><span>API Key</span><input id="runtime-api-key" type="password" autocomplete="off" /></label>
        </div>
        <div class="runtime-current"><div id="runtime-current-status"></div></div>
        <p id="runtime-message" class="runtime-message hidden"></p>
        <div class="actions"><button id="runtime-recommend" type="button" class="secondary">推荐值</button><button id="runtime-apply" type="submit">应用挡位</button></div>
      </form>
    </div>
  </div>
  <script>window.__AI_TOOLBOX_CONFIG__ = {"study_planner": {"label": "学习计划", "description": "按目标、天数和每天投入时间，生成循序渐进的学习安排。", "tip": "最适合先验证三挡位和整体流程。", "task": "生成学习计划", "fields": [{"name": "goal", "label": "学习目标", "type": "textarea", "rows": 3, "value": "学 Python 自动化，并能自己写小工具。"}, {"name": "days", "label": "学习天数", "type": "number", "min": 3, "max": 120, "step": 1, "value": 14}, {"name": "hours_per_day", "label": "每天学习时长（小时）", "type": "number", "min": 0.5, "max": 12, "step": 0.5, "value": 2}, {"name": "level", "label": "当前水平（可选）", "type": "select", "value": "", "options": [{"value": "", "label": "不指定（默认按初学者）"}, {"value": "初学者", "label": "初学者"}, {"value": "中级", "label": "中级"}, {"value": "高级", "label": "高级"}]}]}, "doc_qa": {"label": "文档问答", "description": "输入文档内容和问题，返回摘要、回答和证据。", "tip": "适合快速整理资料重点。", "task": "文档问答", "fields": [{"name": "content", "label": "文档内容", "type": "textarea", "rows": 8, "value": "我们把缓存层换成 Redis，平均延迟从 420ms 降到 150ms，项目分两阶段上线，总共用了三周。"}, {"name": "question", "label": "你的问题", "type": "text", "value": "做了什么优化，效果是什么？"}]}, "resume_optimizer": {"label": "简历优化", "description": "对照目标岗位，找出关键词缺口并给出修改建议。", "tip": "适合投递前快速体检。", "task": "简历优化", "fields": [{"name": "resume_text", "label": "简历内容", "type": "textarea", "rows": 8, "value": "技能：Python、Flask、SQL。\n经历：搭建内部 API 服务，将延迟降低 35%。"}, {"name": "target_job", "label": "目标岗位", "type": "text", "value": "后端工程师"}, {"name": "job_description", "label": "岗位描述", "type": "textarea", "rows": 5, "value": "需要 Python、Flask、SQL、testing、architecture、communication 能力。"}]}, "interview_generator": {"label": "面试题生成", "description": "按岗位、级别和技能生成结构化面试题。", "tip": "适合自测或出题。", "task": "生成面试题", "fields": [{"name": "role", "label": "岗位名称", "type": "text", "value": "后端工程师"}, {"name": "level", "label": "岗位级别", "type": "select", "value": "中级", "options": [{"value": "初级", "label": "初级"}, {"value": "中级", "label": "中级"}, {"value": "高级", "label": "高级"}]}, {"name": "skills", "label": "技能列表", "type": "text", "value": "Python, 系统设计, SQL"}, {"name": "question_count", "label": "题目数量", "type": "number", "min": 3, "max": 20, "step": 1, "value": 5}]}, "code_explainer": {"label": "代码解释", "description": "解释代码、指出风险和优化建议；切到 ollama / openai 后会调用对应模型。", "tip": "mock 挡位只用于演示流程。", "task": "解释代码", "fields": [{"name": "code", "label": "代码内容", "type": "textarea", "rows": 8, "value": "def add(a, b):\n    return a + b"}, {"name": "focus", "label": "分析重点", "type": "text", "value": "关注 bug 和优化建议"}, {"name": "language", "label": "代码语言", "type": "text", "value": "Python"}]}};</script>
  <script src="/first-depot/ai-toolbox/app.js"></script>
</body>
</html>
