name: Auto Publish and Sync Pages

  on:
    schedule:
      - cron: "15 * * * *"
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    publish:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.13"

        - name: Install deps
          run: pip install -r requirements.txt

        - name: Run one publish cycle
          env:
            AUTO_PUBLISH_MODE: auto
          run: python -m scripts.run_once

        - name: Sync posts for Pages
          run: |
            mkdir -p _posts
            cp -f deliverables/published/*.md _posts/ || true

        - name: Commit and push if changed
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-
  actions[bot]@users.noreply.github.com"
            git add deliverables/published _posts
            if git diff --cached --quiet; then
              echo "No changes"
            else
              git commit -m "auto: publish new post"
              git push
            fi
