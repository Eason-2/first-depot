name: Auto Publish and Sync Pages

  'on':
    schedule:
      - cron: '15 * * * *'
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    publish:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.13'

        - run: pip install -r requirements.txt

        - env:
            AUTO_PUBLISH_MODE: auto
          run: python -m scripts.run_once

        - run: |
            mkdir -p _posts
            cp -f deliverables/published/*.md _posts/ || true

        - run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-
  actions[bot]@users.noreply.github.com"
            git add deliverables/published _posts
            if git diff --cached --quiet; then
              echo "No changes"
            else
              git commit -m "auto: publish new post"
              git push
            fi
