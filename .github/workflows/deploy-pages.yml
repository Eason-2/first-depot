name: Deploy Blog to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build static site
        env:
          BLOG_CNAME: ${{ vars.BLOG_CNAME }}
          BLOG_BASE_PATH: ${{ vars.BLOG_BASE_PATH }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"
          BASE_PATH="${BLOG_BASE_PATH}"
          if [ -z "${BASE_PATH}" ]; then
            if [ "${REPO_NAME}" = "${OWNER_NAME}.github.io" ] || [ "${REPO_NAME}" = "${OWNER_NAME,,}.github.io" ]; then
              BASE_PATH=""
            else
              BASE_PATH="/${REPO_NAME}"
            fi
          fi
          if [ -n "${BLOG_CNAME}" ]; then
            python -m scripts.export_static_site --output-dir site --cname "${BLOG_CNAME}" --base-path "${BASE_PATH}"
          else
            python -m scripts.export_static_site --output-dir site --base-path "${BASE_PATH}"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
